include:
  - docker-compose.base.yaml

services:
  auth-db:
    image: postgres:16
    container_name: twomice-prod-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: twomice
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: auth
    volumes: [auth-db-prod-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twomice -d auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  post-db:
    image: postgres:16
    container_name: twomice-prod-post-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: twomice
      POSTGRES_PASSWORD: ${POST_DB_PASSWORD}
      POSTGRES_DB: post
    volumes: [post-db-prod-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twomice -d post"]
      interval: 5s
      timeout: 5s
      retries: 5

  moderation-db:
    image: postgres:16
    container_name: twomice-prod-moderation-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: twomice
      POSTGRES_PASSWORD: ${MODERATION_DB_PASSWORD}
      POSTGRES_DB: moderation
    volumes: [moderation-db-prod-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twomice -d moderation"]
      interval: 5s
      timeout: 5s
      retries: 5

  social-db:
    image: postgres:16
    container_name: twomice-prod-social-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: twomice
      POSTGRES_PASSWORD: ${SOCIAL_DB_PASSWORD}
      POSTGRES_DB: social
    volumes: [social-db-prod-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twomice -d social"]
      interval: 5s
      timeout: 5s
      retries: 5

  social-feed-db:
    image: postgres:16
    container_name: twomice-prod-social-feed-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: twomice
      POSTGRES_PASSWORD: ${FEED_DB_PASSWORD}
      POSTGRES_DB: social_feed
    volumes: [social-feed-db-prod-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twomice -d social_feed"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    # no host port — accessed internally by caddy

  frontend:
    image: ghcr.io/mouseburrow/twomice-frontend:${ENV:-test-latest}
    restart: unless-stopped
    ports: ["127.0.0.1:5173:80"]

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports: ["1918:80", "8080:80"]
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  auth-db-prod-data:
  post-db-prod-data:
  moderation-db-prod-data:
  social-db-prod-data:
  social-feed-db-prod-data:
