name: Deploy
on:
  push:
    branches: [main]
    paths: ["deploy/**"]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync deploy configs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
           script: |
            cd /home/admin/twomice
            git pull origin main
            mkdir -p deploy
            echo "ENV=prod-latest" > deploy/.env
            echo "APP_ENV=prod" >> deploy/.env
            echo "AUTH_DB_PASSWORD=${{ secrets.AUTH_DB_PASSWORD }}" >> deploy/.env
            echo "POST_DB_PASSWORD=${{ secrets.POST_DB_PASSWORD }}" >> deploy/.env
            echo "MODERATION_DB_PASSWORD=${{ secrets.MODERATION_DB_PASSWORD }}" >> deploy/.env
            echo "SOCIAL_DB_PASSWORD=${{ secrets.SOCIAL_DB_PASSWORD }}" >> deploy/.env
            echo "FEED_DB_PASSWORD=${{ secrets.FEED_DB_PASSWORD }}" >> deploy/.env
            echo "AUTH_DATABASE_URL=postgresql://twomice:${{ secrets.AUTH_DB_PASSWORD }}@auth-db:5432/auth" >> deploy/.env
            echo "POST_DATABASE_URL=postgresql://twomice:${{ secrets.POST_DB_PASSWORD }}@post-db:5432/post" >> deploy/.env
            echo "MODERATION_DATABASE_URL=postgresql://twomice:${{ secrets.MODERATION_DB_PASSWORD }}@moderation-db:5432/moderation" >> deploy/.env
            echo "SOCIAL_DATABASE_URL=postgresql://twomice:${{ secrets.SOCIAL_DB_PASSWORD }}@social-db:5432/social" >> deploy/.env
            echo "FEED_DATABASE_URL=postgresql://twomice:${{ secrets.FEED_DB_PASSWORD }}@social-feed-db:5432/social_feed" >> deploy/.env
            docker pull ghcr.io/mouseburrow/twomice-frontend:${ENV:-test-latest}
            ENV=prod-latest docker compose -f deploy/docker-compose.prod.yaml up -d caddy --remove-orphans
            ENV=test-latest docker compose -f deploy/docker-compose.test.yaml up -d
