include:
  - docker-compose.base.yaml

services:
  auth-db:
    image: postgres:16
    container_name: twomice-test-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: twomice
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: auth
    ports: ["127.0.0.1:15432:5432"]
    volumes: [auth-db-test-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twomice -d auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  post-db:
    image: postgres:16
    container_name: twomice-test-post-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: twomice
      POSTGRES_PASSWORD: ${POST_DB_PASSWORD}
      POSTGRES_DB: post
    ports: ["127.0.0.1:15433:5432"]
    volumes: [post-db-test-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twomice -d post"]
      interval: 5s
      timeout: 5s
      retries: 5

  moderation-db:
    image: postgres:16
    container_name: twomice-test-moderation-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: twomice
      POSTGRES_PASSWORD: ${MODERATION_DB_PASSWORD}
      POSTGRES_DB: moderation
    ports: ["127.0.0.1:15434:5432"]
    volumes: [moderation-db-test-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twomice -d moderation"]
      interval: 5s
      timeout: 5s
      retries: 5

  social-db:
    image: postgres:16
    container_name: twomice-test-social-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: twomice
      POSTGRES_PASSWORD: ${SOCIAL_DB_PASSWORD}
      POSTGRES_DB: social
    ports: ["127.0.0.1:15435:5432"]
    volumes: [social-db-test-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twomice -d social"]
      interval: 5s
      timeout: 5s
      retries: 5

  social-feed-db:
    image: postgres:16
    container_name: twomice-test-social-feed-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: twomice
      POSTGRES_PASSWORD: ${FEED_DB_PASSWORD}
      POSTGRES_DB: social_feed
    ports: ["127.0.0.1:15436:5432"]
    volumes: [social-feed-db-test-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twomice -d social_feed"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    ports: ["127.0.0.1:8081:8080"]

  frontend:
    image: ghcr.io/mouseburrow/twomice-frontend:${ENV:-test-latest}
    restart: unless-stopped
    ports: ["127.0.0.1:5174:80"]

volumes:
  auth-db-test-data:
  post-db-test-data:
  moderation-db-test-data:
  social-db-test-data:
  social-feed-db-test-data:
