services:
  auth-db:    { extends: { file: db/compose.yaml, service: auth-db } }
  post-db:    { extends: { file: db/compose.yaml, service: post-db } }
  moderation-db: { extends: { file: db/compose.yaml, service: moderation-db } }
  social-db:  { extends: { file: db/compose.yaml, service: social-db } }
  social-feed-db: { extends: { file: db/compose.yaml, service: social-feed-db } }

  auth:
    build: { context: ., dockerfile: Dockerfile.dev }
    container_name: auth-service
    restart: unless-stopped
    working_dir: /workspace/services/auth
    command: cargo watch -x run
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-auth:/app/target
    environment:
      AUTH_DATABASE_URL: postgresql://twomice:twomice@auth-db:5432/auth
      PORT: 8080
      RUST_LOG: info
    depends_on: { auth-db: { condition: service_healthy } }

  post:
    build: { context: ., dockerfile: Dockerfile.dev }
    container_name: post-service
    restart: unless-stopped
    working_dir: /workspace/services/post
    command: cargo watch -x run
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-post:/app/target
    environment:
      POST_DATABASE_URL: postgresql://twomice:twomice@post-db:5432/post
      PORT: 8080
      RUST_LOG: info
    depends_on: { post-db: { condition: service_healthy } }

  moderation:
    build: { context: ., dockerfile: Dockerfile.dev }
    container_name: moderation-service
    restart: unless-stopped
    working_dir: /workspace/services/moderation
    command: cargo watch -x run
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-moderation:/app/target
    environment:
      MODERATION_DATABASE_URL: postgresql://twomice:twomice@moderation-db:5432/moderation
      PORT: 8080
      RUST_LOG: info
    depends_on: { moderation-db: { condition: service_healthy } }

  social:
    build: { context: ., dockerfile: Dockerfile.dev }
    container_name: social-service
    restart: unless-stopped
    working_dir: /workspace/services/social
    command: cargo watch -x run
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-social:/app/target
    environment:
      SOCIAL_DATABASE_URL: postgresql://twomice:twomice@social-db:5432/social
      PORT: 8080
      RUST_LOG: info
    depends_on: { social-db: { condition: service_healthy } }

  social-feed:
    build: { context: ., dockerfile: Dockerfile.dev }
    container_name: social-feed-service
    restart: unless-stopped
    working_dir: /workspace/services/social-feed
    command: cargo watch -x run
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-social-feed:/app/target
    environment:
      FEED_DATABASE_URL: postgresql://twomice:twomice@social-feed-db:5432/social_feed
      PORT: 8080
      RUST_LOG: info
    depends_on: { social-feed-db: { condition: service_healthy } }

  gateway:
    build: { context: ., dockerfile: Dockerfile.dev }
    container_name: gateway-service
    restart: unless-stopped
    working_dir: /workspace/services/gateway
    command: cargo watch -x run
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-gateway:/app/target
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: "http://auth:8080"
      POST_SERVICE_URL: "http://post:8080"
      MODERATION_SERVICE_URL: "http://moderation:8080"
      SOCIAL_SERVICE_URL: "http://social:8080"
      FEED_SERVICE_URL: "http://social-feed:8080"
    ports: ["3030:8080"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: twomice-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY: http://gateway:8080

  migrate:
    build: { context: ., dockerfile: Dockerfile.dev }
    container_name: twomice-migrate
    working_dir: /workspace
    command: bash /workspace/scripts/migrate-all.sh
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
    environment:
      AUTH_DATABASE_URL: postgresql://twomice:twomice@auth-db:5432/auth
      POST_DATABASE_URL: postgresql://twomice:twomice@post-db:5432/post
      MODERATION_DATABASE_URL: postgresql://twomice:twomice@moderation-db:5432/moderation
      SOCIAL_DATABASE_URL: postgresql://twomice:twomice@social-db:5432/social
      FEED_DATABASE_URL: postgresql://twomice:twomice@social-feed-db:5432/social_feed
    depends_on:
      auth-db: { condition: service_healthy }
      post-db: { condition: service_healthy }
      moderation-db: { condition: service_healthy }
      social-db: { condition: service_healthy }
      social-feed-db: { condition: service_healthy }
    profiles: ["migrate"]

volumes:
  cargo-cache:
  target-auth:
  target-post:
  target-moderation:
  target-social:
  target-social-feed:
  target-gateway:
  auth-db-data:
  post-db-data:
  moderation-db-data:
  social-db-data:
  social-feed-db-data:
