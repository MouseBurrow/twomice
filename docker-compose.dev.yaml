services:
  auth-db:
    extends:
      file: db/compose.yaml
      service: auth-db

  post-db:
    extends:
      file: db/compose.yaml
      service: post-db

  auth:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: auth-service
    restart: unless-stopped
    working_dir: /workspace/services/auth
    command: cargo watch -x run
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-auth:/app/target
    environment:
      AUTH_DATABASE_URL: "${AUTH_DATABASE_URL}"
      PORT: 8080
    depends_on:
      auth-db:
        condition: service_healthy

  post:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: post-service
    restart: unless-stopped
    working_dir: /workspace/services/post
    command: cargo watch -x run
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-post:/app/target
    environment:
      POST_DATABASE_URL: "${POST_DATABASE_URL}"
      PORT: 8080
    depends_on:
      post-db:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gateway-service
    restart: unless-stopped
    working_dir: /workspace/services/gateway
    command: cargo watch -x run
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-gateway:/app/target
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: "http://auth:8080"
      POST_SERVICE_URL: "http://post:8080"
    ports:
      - "3030:8080"

volumes:
  cargo-cache:
  target-auth:
  target-post:
  target-gateway:
