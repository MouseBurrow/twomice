server {
    listen 80;
    server_name twomice.skimnerphi.net;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name twomice.skimnerphi.net;

    ssl_certificate /etc/letsencrypt/live/twomice.skimnerphi.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twomice.skimnerphi.net/privkey.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
